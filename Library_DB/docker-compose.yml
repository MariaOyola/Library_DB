name: library_management

services:
  postgres:
    image: postgres:15-alpine
    container_name: library-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-airline_ops}
      POSTGRES_USER: ${POSTGRES_USER:-library_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-library_pass}
    ports:
      - "5436:5432"
    volumes:
      - library_data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${POSTGRES_USER:-library_user} -d ${POSTGRES_DB:-airline_ops}
      interval: 5s
      timeout: 5s
      retries: 10

  liquibase:
    build:
      context: .
      dockerfile: docker/liquibase/Dockerfile
    image: library-liquibase:5.0.2
    profiles:
      - tooling
    depends_on:
      postgres:
        condition: service_healthy
    working_dir: /workspace
    volumes:
      - ./:/workspace
    entrypoint:
      - liquibase
      - --search-path=/workspace
      - --changeLogFile=changelog-master.yaml
      - --classpath=/liquibase/liquibase_libs/postgresql-42.7.8.jar
      - --url=jdbc:postgresql://postgres:5432/${POSTGRES_DB:-airline_ops}
      - --username=${POSTGRES_USER:-library_user}
      - --password=${POSTGRES_PASSWORD:-library_pass}

volumes:
  library_data:
